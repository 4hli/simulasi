<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulasi Keuangan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    
        :root {
          --bg: #f0f2f5;
          --card-bg: #ffffff;
          --text: #1e293b;
          --text-muted: #64748b;
          --primary: #0f172a;
          --accent: #2563eb;
          --accent-hover: #1d4ed8;
          --border: #e2e8f0;
          --input-bg: #f8fafc;
          --table-head: #f1f5f9;
          --summary-1-bg: #ecfdf5;
          --summary-1-border: #a7f3d0;
          --summary-1-title: #059669;
          --summary-1-text: #064e3b;
          
          --summary-2-bg: #eff6ff;
          --summary-2-border: #bfdbfe;
          --summary-2-title: #2563eb;
          --summary-2-text: #1e3a8a;
        }

        body.dark-mode {
          --bg: #0f172a;
          --card-bg: #1e293b;
          --text: #f8fafc;
          --text-muted: #94a3b8;
          --primary: #f8fafc;
          --accent: #3b82f6;
          --accent-hover: #60a5fa;
          --border: #334155;
          --input-bg: #0f172a;
          --table-head: #0f172a;
          --summary-1-bg: #022c22;
          --summary-1-border: #064e3b;
          --summary-1-title: #34d399;
          --summary-1-text: #a7f3d0;
          
          --summary-2-bg: #172554;
          --summary-2-border: #1e3a8a;
          --summary-2-title: #60a5fa;
          --summary-2-text: #bfdbfe;
        }

        body {
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background-color: var(--bg);
          color: var(--text);
          padding: 30px 20px;
          line-height: 1.6;
          transition: background-color 0.4s ease, color 0.4s ease;
          margin: 0;
        }
        
        .container {
          max-width: 850px;
          margin: auto;
          background: var(--card-bg);
          padding: 40px;
          border-radius: 16px;
          box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
          border: 1px solid var(--border);
          transition: all 0.4s ease;
        }

        h2 {
          text-align: center;
          color: var(--text);
          margin-top: 0;
          margin-bottom: 30px;
          font-weight: 700;
          font-size: 1.8rem;
          letter-spacing: -0.025em;
        }

        .form-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 30px;
        }

        @media (max-width: 600px) {
          .form-grid { grid-template-columns: 1fr; gap: 16px; }
          .container { padding: 20px 15px; }
          h2 { font-size: 1.5rem; margin-bottom: 20px; }
          body { padding: 15px 10px; }
        }

        .form-group { margin-bottom: 0; }
        
        label {
          display: block;
          margin-bottom: 8px;
          font-weight: 600;
          color: var(--text);
          font-size: 0.9rem;
        }

        input {
          width: 100%;
          padding: 14px 16px;
          font-size: 1rem;
          border: 1px solid var(--border);
          border-radius: 10px;
          background-color: var(--input-bg);
          color: var(--text);
          box-sizing: border-box;
          transition: all 0.2s ease;
        }

        input:focus {
          border-color: var(--accent);
          box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
          outline: none;
          background-color: var(--card-bg);
        }

        .btn-primary {
          width: 100%;
          padding: 16px;
          background: var(--accent);
          color: #ffffff;
          font-size: 1.1rem;
          font-weight: 600;
          border: none;
          border-radius: 10px;
          cursor: pointer;
          transition: all 0.2s ease;
          box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
          background-color: var(--accent-hover);
          transform: translateY(-2px);
          box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:active { transform: translateY(0); }

        .result-container {
          margin-top: 10px;
        }

        .result-container h3 {
          color: var(--text);
          margin-bottom: 25px;
          text-align: center;
          font-weight: 600;
          font-size: 1.4rem;
        }

        .summary-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 30px;
        }

        @media (max-width: 600px) {
          .summary-grid { grid-template-columns: 1fr; }
          .summary-card .amount { font-size: 1.5rem; }
        }

        .summary-card {
          padding: 24px;
          border-radius: 12px;
          text-align: center;
          border: 1px solid transparent;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .summary-card:hover {
          transform: translateY(-4px);
          box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15);
        }

        .card-saldo {
          background: var(--summary-1-bg);
          border-color: var(--summary-1-border);
        }
        .card-saldo h4 { color: var(--summary-1-title); }
        .card-saldo .amount { color: var(--summary-1-text); }

        .card-bunga {
          background: var(--summary-2-bg);
          border-color: var(--summary-2-border);
        }
        .card-bunga h4 { color: var(--summary-2-title); }
        .card-bunga .amount { color: var(--summary-2-text); }

        .summary-card .card-header {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          margin-bottom: 12px;
        }
        .card-saldo .card-header { color: var(--summary-1-title); }
        .card-bunga .card-header { color: var(--summary-2-title); }
        .summary-card .card-header i {
          font-size: 1.1rem;
          opacity: 0.9;
        }

        .summary-card h4 {
          margin: 0;
          font-size: 0.85rem;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }

        .summary-card .amount {
          font-size: 1.75rem;
          font-weight: 700;
          letter-spacing: -0.025em;
        }

        .summary-card .subtitle {
          font-size: 0.85rem;
          color: var(--text-muted);
          margin-top: 8px;
        }

        .table-responsive {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          border-radius: 10px;
          border: 1px solid var(--border);
        }

        table {
          width: 100%;
          border-collapse: collapse;
          background: var(--card-bg);
        }

        th, td {
          padding: 14px 16px;
          text-align: left;
          font-size: 0.95rem;
          white-space: nowrap;
          border-bottom: 1px solid var(--border);
        }

        th {
          background: var(--table-head);
          font-weight: 600;
          color: var(--text-muted);
          text-transform: uppercase;
          font-size: 0.75rem;
          letter-spacing: 0.05em;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--input-bg); }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        #cetakButton { text-align: center; margin-top: 30px; }
        #cetakButton button {
          background: var(--primary);
          color: var(--card-bg);
          padding: 12px 24px;
          font-size: 1rem;
          font-weight: 600;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          transition: all 0.2s ease;
        }
        #cetakButton button:hover {
          background-color: var(--text);
          transform: translateY(-2px);
        }

        #darkModeToggle {
          position: absolute;
          top: 25px;
          right: 25px;
          background: var(--card-bg);
          border: 1px solid var(--border);
          cursor: pointer;
          font-size: 1.2rem;
          color: var(--text-muted);
          width: 44px;
          height: 44px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: all 0.3s ease;
          box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #darkModeToggle:hover {
          color: var(--accent);
          border-color: var(--accent);
          transform: scale(1.05);
        }

        body.dark-mode #darkModeToggle {
          color: #fbbf24;
          border-color: #fbbf24;
        }

        .footer {
          text-align: center;
          margin-top: 40px;
          font-size: 0.85rem;
          color: var(--text-muted);
        }

        /* Gaya untuk Sistem Tab */
        .tab-nav {
          display: flex;
          border-bottom: 2px solid var(--border);
          margin-bottom: 25px;
        }
        .tab-btn {
          flex: 1;
          background: none;
          border: none;
          padding: 14px 20px;
          font-size: 1.05rem;
          font-weight: 600;
          color: var(--text-muted);
          cursor: pointer;
          border-bottom: 3px solid transparent;
          transition: all 0.3s ease;
          margin-bottom: -2px;
        }
        .tab-btn:hover:not(.active) {
          color: var(--text);
          background-color: var(--input-bg);
          border-radius: 8px 8px 0 0;
        }
        .tab-btn.active {
          color: var(--accent);
          border-bottom-color: var(--accent);
        }
        .tab-content {
          display: none;
          animation: fadeInTab 0.4s ease-out;
        }
        .tab-content.active {
          display: block;
        }
        @keyframes fadeInTab {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
          .tab-btn { padding: 12px 10px; font-size: 0.95rem; }
          .tab-nav { margin-bottom: 20px; }
        }
  </style>
</head>
<body>
  <button id="darkModeToggle" aria-label="Toggle dark mode">
    <i class="fas fa-moon"></i> </button>

  <div class="container">
    <h2>Simulasi Tabungan</h2>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="openTab('tabInput', this)" id="btnTabInput">Input Data</button>
      <button class="tab-btn" onclick="openTab('tabHasil', this)" id="btnTabHasil">Hasil Rincian</button>
    </div>

    <div id="tabInput" class="tab-content active">
      <form id="formInput">
        <div class="form-grid">
          <div class="form-group">
            <label for="saldoAwalTabungan">Saldo Awal (Rp)</label>
            <input type="text" id="saldoAwalTabungan" placeholder="Contoh: 10.000.000" oninput="formatRpInput(this)" onfocus="clearFormat(this)" onblur="formatRpInput(this)">
          </div>
          <div class="form-group">
            <label for="setoranBulananTabungan">Setoran Bulanan (Rp)</label>
            <input type="text" id="setoranBulananTabungan" placeholder="Contoh: 1.000.000" oninput="formatRpInput(this)" onfocus="clearFormat(this)" onblur="formatRpInput(this)">
          </div>
          <div class="form-group">
            <label for="tenorTabungan">Jangka Waktu (Bulan)</label>
            <input type="number" id="tenorTabungan" placeholder="Contoh: 12">
          </div>
          <div class="form-group">
            <label for="bungaTahunanTabungan">Suku Bunga Tahunan (%)</label>
            <input type="number" step="0.01" id="bungaTahunanTabungan" placeholder="Contoh: 5.5">
          </div>
        </div>
      </form>

      <button class="btn-primary" onclick="hitungSimulasi()">HITUNG SIMULASI</button>
    </div>

    <div id="tabHasil" class="tab-content">
      <div class="result-container" id="resultContainer">
        <h3>Rincian Detail:</h3>
        <div id="hasilSimulasi">
           <p style="text-align: center; color: var(--text-muted); padding: 40px 0;">Silakan isi form dan klik "Hitung Simulasi" untuk melihat hasil.</p>
        </div>
        <div id="cetakButton" style="display:none;">
          <button onclick="cetakHasil()">🖨️ CETAK</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    &copy; <span id="currentYear"></span> 4hli Prosesor
  </div>

 <script>
function cetakHasil() {
  const hasil = document.getElementById("hasilSimulasi").innerHTML;
  const newWindow = window.open("", "Cetak Hasil Simulasi", "width=800,height=600");
  newWindow.document.write("<html><head><title>Cetak Hasil Simulasi</title>");
  newWindow.document.write("<style>body { font-family: Arial; margin: 20px; } table { width: 100%; border-collapse: collapse; } table th, table td { border: 1px solid #ccc; padding: 8px; text-align: left; } table th { background: #eee; } table th, table td { white-space: nowrap; }</style>");
  newWindow.document.write("</head><body><h2>Rincian Simulasi</h2>");
  newWindow.document.write(infoCetak); 
  const tableStart = hasil.indexOf("<table");
  const tableHTML = tableStart !== -1 ? hasil.slice(tableStart) : "";
  const cleanedTableHTML = tableHTML.replace("<div class=\"table-responsive\">", "").replace("</div>", "");
  newWindow.document.write(cleanedTableHTML);
  newWindow.document.write("</body></html>");
  newWindow.document.close();
  newWindow.print();
}


function formatRpInput(input) {
  let value = input.value.replace(/[^\d]/g, "");
  input.value = value ? "Rp " + parseInt(value, 10).toLocaleString("id-ID") : "";
}


function clearFormat(input) {
  input.value = input.value.replace(/[^\d]/g, "");
}


function parseRupiah(str) {
  return parseInt(str.replace(/[^\d]/g, ""), 10) || 0;
}

let infoCetak = ""; 

function openTab(tabId, btnElement) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    
    if (btnElement) {
        btnElement.classList.add('active');
    } else {
        const btnId = tabId === 'tabInput' ? 'btnTabInput' : 'btnTabHasil';
        document.getElementById(btnId).classList.add('active');
    }
}

function hitungSimulasi() {
  const hasilEl = document.getElementById("hasilSimulasi");
  let html = "";
  infoCetak = ""; 

    let currentSaldo = parseRupiah(document.getElementById("saldoAwalTabungan").value);
    const setoranBulananInput = parseRupiah(document.getElementById("setoranBulananTabungan").value);
    const tenorTabungan = parseInt(document.getElementById("tenorTabungan").value);
    const bungaTahunanTabungan = parseFloat(document.getElementById("bungaTahunanTabungan").value);

    const BATAS_SALDO_PAJAK = 7500000; 
    const PAJAK_BUNGA_RATE = 0.20; 

    if (isNaN(currentSaldo) || isNaN(setoranBulananInput) || isNaN(tenorTabungan) || isNaN(bungaTahunanTabungan) || currentSaldo < 0 || setoranBulananInput < 0 || tenorTabungan <= 0 || bungaTahunanTabungan < 0) {
      alert("Mohon isi semua kolom tabungan dengan angka yang valid.");
      hasilEl.innerHTML = "";
      document.getElementById("cetakButton").style.display = "none";
      return;
    }

    const bungaBulananRate = (bungaTahunanTabungan / 100) / 12;

    infoCetak += `<p><strong>Tabungan:</strong> Rp ${currentSaldo.toLocaleString("id-ID")}<br>
    <strong>Setoran Bulanan:</strong> Rp ${setoranBulananInput.toLocaleString("id-ID")}<br>
    <strong>Jangka Waktu:</strong> ${tenorTabungan} bulan<br>
    <strong>Bunga Per Tahun:</strong> ${bungaTahunanTabungan}%<br>
    </p>`;

    html += `
    <div class="summary-grid">
      <div class="summary-card card-saldo">
        <div class="card-header">
          <i class="fas fa-wallet"></i>
          <h4>Estimasi Saldo Akhir</h4>
        </div>
        <div class="amount">Rp <span id="summarySaldo">...</span></div>
        <div class="subtitle">Setelah ${tenorTabungan} Bulan</div>
      </div>
      <div class="summary-card card-bunga">
        <div class="card-header">
          <i class="fas fa-percent"></i>
          <h4>Total Bunga Bersih</h4>
        </div>
        <div class="amount">Rp <span id="summaryBunga">...</span></div>
        <div class="subtitle">Sudah dipotong pajak (jika ada)</div>
      </div>
    </div>
    `;

    html += "<div class='table-responsive'>";
    html += "<table><tr><th class='text-center'>Bulan</th><th class='text-right'>Saldo Awal</th><th class='text-right'>Setoran</th><th class='text-right'>Bunga Kotor</th><th class='text-right'>Pajak</th><th class='text-right'>Bunga Bersih</th><th class='text-right'>Saldo Akhir</th></tr>";

    let totalBungaBersih = 0;
    for (let i = 1; i <= tenorTabungan; i++) {
      let saldoAwalBulanIniTampil = currentSaldo; 
      
      let setoranBulanIni = (i === 1) ? 0 : setoranBulananInput; 

      let saldoUntukBungaCalculation = currentSaldo + setoranBulanIni; 
      
      let bungaKotorBulanan = saldoUntukBungaCalculation * bungaBulananRate;
      
      let pajakBungaBulanan = 0;
      if (saldoUntukBungaCalculation + bungaKotorBulanan >= BATAS_SALDO_PAJAK) { 
          pajakBungaBulanan = bungaKotorBulanan * PAJAK_BUNGA_RATE;
      }
      
      let bungaBersihBulanan = bungaKotorBulanan - pajakBungaBulanan;

      currentSaldo = saldoUntukBungaCalculation + bungaBersihBulanan;
      totalBungaBersih += bungaBersihBulanan;

      html += `<tr>
                <td class='text-center'>${i}</td>
                <td class='text-right'>Rp ${Math.round(saldoAwalBulanIniTampil).toLocaleString("id-ID")}</td>
                <td class='text-right'>Rp ${Math.round(setoranBulanIni).toLocaleString("id-ID")}</td>
                <td class='text-right'>Rp ${Math.round(bungaKotorBulanan).toLocaleString("id-ID")}</td>
                <td class='text-right'>Rp ${Math.round(pajakBungaBulanan).toLocaleString("id-ID")}</td>
                <td class='text-right'>Rp ${Math.round(bungaBersihBulanan).toLocaleString("id-ID")}</td>
                <td class='text-right'><strong>Rp ${Math.round(currentSaldo).toLocaleString("id-ID")}</strong></td>
              </tr>`;
    }
    html += "</table>";
    html += "</div>";
    
    
    html = html.replace('<span id="summarySaldo">...</span>', Math.round(currentSaldo).toLocaleString("id-ID"));
    html = html.replace('<span id="summaryBunga">...</span>', Math.round(totalBungaBersih).toLocaleString("id-ID"));

    document.getElementById("cetakButton").style.display = "block";

  hasilEl.innerHTML = infoCetak + html;

  // Otomatis pindah ke tab Hasil Rincian
  openTab('tabHasil');
}

const darkModeToggle = document.getElementById('darkModeToggle');
const body = document.body;

function setDarkMode(isDark) {
    if (isDark) {
        body.classList.add('dark-mode');
        darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        localStorage.setItem('darkMode', 'enabled');
    } else {
        body.classList.remove('dark-mode');
        darkModeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        localStorage.setItem('darkMode', 'disabled');
    }
}


document.addEventListener('DOMContentLoaded', () => {
    
    const savedMode = localStorage.getItem('darkMode');
    if (savedMode === 'enabled') {
        setDarkMode(true);
    } else {
        setDarkMode(false);
    }

    
    document.getElementById('currentYear').textContent = new Date().getFullYear();
});


darkModeToggle.addEventListener('click', () => {
    setDarkMode(!body.classList.contains('dark-mode'));
});

</script>
</body>
</html>
